<nav class="navbar sticky-top navbar-light bg-light mx-3">
	<div class="container-fluid btn-group" role="group" aria-label="Basic outlined example">
		<button type="button" class="btn btn-outline-primary" [class.active]="activeTab === newsType.TOP_NEWS" (click)="activeTab = newsType.TOP_NEWS">Top News</button>
		<button type="button" class="btn btn-outline-primary" [class.active]="activeTab === newsType.TECHNOLOGY" (click)="activeTab = newsType.TECHNOLOGY">Technology</button>
		<button type="button" class="btn btn-outline-primary" [class.active]="activeTab === newsType.SPORTS" (click)="activeTab = newsType.SPORTS">Sports</button>
	</div>
</nav>
<div class="mx-3">
	@for (news of news(); track news.title) {
		<div class="container card border border-success rounded-0 mb-0 px-0">
			<div class="card-header d-flex">
				<h5 class="card-title">{{ news.title[0] }}</h5>
			</div>
			<div class="card-body">
				<h6>Related Coverage</h6>
				<p class="card-text" [innerHTML]="news.description[0]"></p>
			</div>
			<div class="card-footer d-flex justify-content-between">
				<span class="d-flex align-items-center">
					{{ news.pubDate[0] | date:'mediumDate' }}
				</span>
				<a [href]="news.link[0]" target="_blank" class="btn btn-primary">
					Read Full Story
				</a>
			</div>
		</div>
	}
</div>
