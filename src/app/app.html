<nav class="navbar sticky-top navbar-light bg-light mx-3">
  <div class="container-fluid d-flex flex-wrap gap-2 justify-content-start">
    @for (type of newsTypes; track type) {
      <button
        type="button"
        class="btn btn-outline-primary flex-grow-1"
        [class.active]="activeTab === type"
        (click)="getNews(type)"
      >
        {{ type }}
      </button>
    }
  </div>
</nav>

@if (showSpinner()) {
  <div class="d-flex justify-content-center align-items-center min-vh-100">
    <div class="spinner-border" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>
} @else {
  <div class="mx-3">
    @for (news of news(); track news.title) {
      <div class="card border border-success rounded-0 mb-0 px-0">
        <div class="card-header d-flex">
          <h5 class="card-title">
            {{ news.title[0] }}
          </h5>
        </div>

        <div class="card-body">
          <h6>Related Coverage</h6>
          <p class="card-text" [innerHTML]="news.description[0]"></p>
        </div>
        <div class="card-footer d-flex justify-content-between">
          <span class="d-flex align-items-center">
            {{ news.pubDate[0] | date: 'mediumDate' }}
          </span>
          <a [href]="news.link[0]" target="_blank" class="btn btn-primary"> Read Full Story </a>
        </div>
      </div>
    }
  </div>
}

@if (errorMessage()) {
  <div class="alert alert-danger mx-3 mt-3" role="alert">
    {{ errorMessage() }}
  </div>
}
